name: Uptime Monitor

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes
  workflow_dispatch:          # manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping EmeraldFi
        id: ping
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://emeraldfinance.fun/ping)
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          if [ "$STATUS" != "200" ]; then
            echo "SITE_DOWN=true" >> $GITHUB_ENV
          fi

      - name: Alert via Telegram if down
        if: env.SITE_DOWN == 'true'
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d '{
              "chat_id": "${{ secrets.ADMIN_CHAT_ID }}",
              "text": "🔴 *EmeraldFi is DOWN!*\n\nhttps://emeraldfinance.fun returned HTTP ${{ steps.ping.outputs.status }}\n\nCheck the server immediately.",
              "parse_mode": "Markdown"
            }'
